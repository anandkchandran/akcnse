services:
  - type: web
    name: akcnse-api
    runtime: node
    region: singapore          # closest to NSE / IST users
    plan: free

    buildCommand: "npm install"
    startCommand: "node server.js"
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      # Set in Render dashboard → Environment → Secret Files / Env Vars:
      - key: GEMINI_API_KEY
        sync: false            # paste your key in the Render dashboard

      # Set to your GitHub Pages origin, e.g. https://yourname.github.io
      # Render will allow CORS only from this origin in production.
      - key: ALLOWED_ORIGINS
        sync: false

      # Google Analytics 4 Measurement ID (format: G-XXXXXXXXXX)
      # Get it from: analytics.google.com → Admin → Data Streams → your web stream
      - key: VITE_GA_MEASUREMENT_ID
        sync: false
