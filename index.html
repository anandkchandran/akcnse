<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#0b0f1a" />
    <meta name="description" content="THEAKCNSE — NSE Equities Terminal. Live charts, AI signals, paper trading." />
    <title>THEAKCNSE — NSE Terminal</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700;800&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Skeleton CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/skeleton/2.0.4/skeleton.min.css" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; background: #0b0f1a; color: #b8cce0; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: #0b0f1a; }
      ::-webkit-scrollbar-thumb { background: #1c2740; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a5270; }
      button { cursor: pointer; transition: all 0.15s; }
      select { cursor: pointer; }
      input { outline: none; }
      * { -webkit-font-smoothing: antialiased; }
    </style>
  </head>
  <body>
    <noscript>akcnse requires JavaScript to run.</noscript>
    <div id="root"></div>
    <!-- Vite entry point -->
    <script type="module" src="/src/index.jsx"></script>
